<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta SLE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 36px 28px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo-text { font-size: 22px; font-weight: 700; color: #378ADD; letter-spacing: 2px; }
        .logo-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
        .divider { height: 1px; background: #f0f0f0; margin-bottom: 24px; }
        .q-number { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #378ADD; margin-bottom: 8px; }
        .q-text { font-size: 17px; font-weight: 600; color: #1a1a1a; line-height: 1.4; margin-bottom: 24px; }
        .options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
        .opt-btn { padding: 16px 18px; border-radius: 12px; border: 2px solid #e0e0e0; background: white; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: #333; text-align: left; line-height: 1.5; }
        .opt-btn:hover { border-color: #378ADD; color: #378ADD; background: #f0f7ff; }
        .opt-btn.sel-a { border-color: #378ADD; background: #378ADD; color: white; }
        .opt-btn.sel-b { border-color: #7B61FF; background: #7B61FF; color: white; }
        .opt-btn.sel-c { border-color: #E24B4A; background: #E24B4A; color: white; }
        .send-btn { width: 100%; padding: 15px; background: #378ADD; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .send-btn:hover { background: #2970c0; }
        .send-btn:disabled { background: #d0d0d0; cursor: default; }

        /* Pantallas de resultado */
        .success { display: none; text-align: center; padding: 16px 0; }
        .success-icon { font-size: 64px; margin-bottom: 16px; }
        .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .success-sub { font-size: 14px; color: #888; line-height: 1.5; }
        .success.correcto .success-title { color: #2e7d32; }
        .success.incorrecto .success-title { color: #c62828; }

        .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #ccc; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-text">SLE</div>
        <div class="logo-sub">Soporte Logístico Express</div>
    </div>
    <div class="divider"></div>

    <div id="form-section">
        <div class="q-number">Pregunta 1 de 1</div>
        <div class="q-text">¿Cuál es el objetivo de tu proceso?</div>
        <div class="options">
            <button class="opt-btn" id="opt-a" onclick="elegir('a')">
                <strong>A)</strong> Garantizar la ejecución eficiente y coordinada de actividades, cumpliendo con los estándares establecidos por cliente.
            </button>
            <button class="opt-btn" id="opt-b" onclick="elegir('b')">
                <strong>B)</strong> Enlace operativo entre el cliente y las áreas internas, asegurando la comunicación asertiva entre ambas partes para la correcta ejecución del servicio conforme a lo pactado.
            </button>
            <button class="opt-btn" id="opt-c" onclick="elegir('c')">
                <strong>C)</strong> Optimizar procesos operativos y administrativos a través de proyectos innovadores, garantizando eficiencia y sostenibilidad, mientras se asegura la satisfacción del cliente mediante la mejora continua, el cumplimiento normativo y la excelencia en la calidad del servicio.
            </button>
        </div>
        <button class="send-btn" id="send-btn" onclick="enviar()" disabled>Enviar respuesta ✓</button>
    </div>

    <!-- Respuesta correcta -->
    <div class="success correcto" id="success-correcto">
        <div class="success-icon">✅</div>
        <div class="success-title">¡Felicidades!</div>
        <div class="success-sub">Gracias por tu participación,<br><strong>tu respuesta es correcta.</strong></div>
    </div>

    <!-- Respuesta incorrecta -->
    <div class="success incorrecto" id="success-incorrecto">
        <div class="success-icon">❌</div>
        <div class="success-title">¡Gracias!</div>
        <div class="success-sub">Gracias por tu participación,<br><strong>tu respuesta es incorrecta.</strong></div>
    </div>

    <div class="footer">Encuesta anónima · SLE 2026</div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, runTransaction, push } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAjGYsPAZqojQhfuE9WruTVMSeOnI8WMAQ",
        authDomain: "encuestasle.firebaseapp.com",
        databaseURL: "https://encuestasle-default-rtdb.firebaseio.com",
        projectId: "encuestasle",
        storageBucket: "encuestasle.firebasestorage.app",
        messagingSenderId: "276179568423",
        appId: "1:276179568423:web:698934055d0306aaddcb02"
    };

    const CORRECTA = 'a';

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let seleccion = null;

    window.elegir = function(op) {
        seleccion = op;
        ['a','b','c'].forEach(o => {
            document.getElementById('opt-'+o).className = 'opt-btn';
        });
        document.getElementById('opt-'+op).className = 'opt-btn sel-'+op;
        document.getElementById('send-btn').disabled = false;
    };

    window.enviar = async function() {
        document.getElementById('send-btn').disabled = true;
        document.getElementById('send-btn').textContent = 'Enviando...';
        try {
            await runTransaction(ref(db, 'votos/q1/' + seleccion), (v) => (v || 0) + 1);
            await push(ref(db, 'respuestas'), {
                objetivo_proceso: seleccion,
                correcta: seleccion === CORRECTA,
                fecha: new Date().toLocaleString('es-MX', { timeZone: 'America/Mexico_City' })
            });

            document.getElementById('form-section').style.display = 'none';

            if (seleccion === CORRECTA) {
                document.getElementById('success-correcto').style.display = 'block';
            } else {
                document.getElementById('success-incorrecto').style.display = 'block';
            }
        } catch(e) {
            document.getElementById('send-btn').disabled = false;
            document.getElementById('send-btn').textContent = 'Reintentar';
            alert('Error al enviar. Verifica tu conexión.');
        }
    };
</script>
</body>
</html>
